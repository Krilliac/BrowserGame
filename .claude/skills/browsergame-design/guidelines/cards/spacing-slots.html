<!-- @dsCard group="Spacing" viewport="700x200" name="Slots, radii & frame" subtitle="Renderer slot sizes (44/52/56px), sharp radii, the 2px gold frame" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--bg-app);
        font-family: var(--font-body);
        padding: 22px;
        display: flex;
        gap: 28px;
        align-items: flex-start;
      }
      .grp {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .lbl {
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-label);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .slot {
        background: var(--surface-slot);
        border: 2px solid var(--gold-500);
        border-radius: var(--radius-slot);
        box-shadow: var(--shadow-slot-inset);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        color: var(--text-faint);
        font-family: var(--font-mono);
        font-size: 9px;
        padding-bottom: 3px;
      }
      .radii {
        display: flex;
        gap: 10px;
      }
      .rc {
        width: 44px;
        height: 44px;
        background: var(--ink-700);
        border: 1px solid var(--gold-600);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="grp">
      <span class="lbl">Slot sizes</span>
      <div class="row">
        <div class="slot" style="width:44px;height:44px">44</div>
        <div class="slot" style="width:52px;height:52px">52</div>
        <div class="slot" style="width:56px;height:56px">56</div>
      </div>
      <span class="lbl" style="color:var(--text-faint)">belt · hotbar · inventory</span>
    </div>
    <div class="grp">
      <span class="lbl">Radii</span>
      <div class="radii">
        <div class="rc" style="border-radius:0">0</div>
        <div class="rc" style="border-radius:4px">4</div>
        <div class="rc" style="border-radius:7px">7</div>
        <div class="rc" style="border-radius:8px">8</div>
      </div>
      <span class="lbl" style="color:var(--text-faint)">sharp by default</span>
    </div>
  </body>
</html>
