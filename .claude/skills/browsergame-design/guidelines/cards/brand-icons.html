<!-- @dsCard group="Brand" viewport="700x230" name="Item icon set — gems, runes, materials" subtitle="The game's own generated 32px loot icons (license-clean)" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--bg-app);
        font-family: var(--font-body);
        padding: 18px 20px;
      }
      .lbl {
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-label);
        margin: 0 0 8px;
      }
      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 14px;
      }
      .slot {
        width: 42px;
        height: 42px;
        background: var(--surface-slot);
        border: 1px solid var(--border-accent-soft);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .slot img {
        width: 32px;
        height: 32px;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <p class="lbl">Gems · socketable</p>
    <div class="grid">
      <div class="slot"><img src="../../assets/icons/gem-ruby.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-sapphire.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-topaz.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-emerald.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-amethyst.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-jade.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-diamond.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-onyx.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/gem-opal.png" alt="" /></div>
    </div>
    <p class="lbl">Runes · runewords &nbsp;·&nbsp; Materials</p>
    <div class="grid">
      <div class="slot"><img src="../../assets/icons/rune-el.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/rune-tir.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/rune-nef.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/rune-ral.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/rune-ort.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/rune-vex.png" alt="" /></div>
      <div class="slot"><img src="../../assets/icons/rune-zod.png" alt="" /></div>
      <div class="slot" style="border-color:var(--fx-fire)"><img src="../../assets/icons/material-ember-ore.png" alt="" /></div>
      <div class="slot" style="border-color:var(--fx-frost)"><img src="../../assets/icons/material-frost-core.png" alt="" /></div>
      <div class="slot" style="border-color:var(--fx-arcane)"><img src="../../assets/icons/material-rune-shard.png" alt="" /></div>
    </div>
  </body>
</html>
