<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(120% 100% at 50% 120%, #1a1f16 0%, var(--ink-900) 70%);
        font-family: var(--font-body);
        padding: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: flex-end;
      }
      .p {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 56px;
        min-height: 56px;
      }
      .p img {
        max-width: 52px;
        max-height: 56px;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div class="p"><img src="../../assets/decor/grave-2.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/grave-5.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/skull-pile.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/bones-4.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/dead-tree-1.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/tree-1.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/crystal-1.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/crystal-4.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/mushroom-3.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/horror-plant-3.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/horror-plant-5.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/thorn-plant-2.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/ruin-2.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/barrel.png" alt="" /></div>
    <div class="p"><img src="../../assets/decor/pot-red.png" alt="" /></div>
  </body>
</html>
