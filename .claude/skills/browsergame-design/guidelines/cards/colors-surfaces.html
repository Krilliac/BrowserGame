<!-- @dsCard group="Colors" viewport="700x180" name="Ink & surfaces" subtitle="The dark world — obsidian ramp + HUD panel fills" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--bg-app);
        font-family: var(--font-body);
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .sw {
        width: 96px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        overflow: hidden;
      }
      .chip {
        height: 56px;
      }
      .meta {
        padding: 6px 8px;
        background: #0a0b0f;
      }
      .nm {
        font-size: 11px;
        color: var(--text-body);
      }
      .hx {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-faint);
      }
    </style>
  </head>
  <body>
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="meta"><div class="nm">ink-950</div><div class="hx">#08090d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="nm">ink-900 · bg</div><div class="hx">#0e0f13</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><div class="nm">ink-800</div><div class="hx">#16171d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="nm">ink-700</div><div class="hx">#1f2128</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="meta"><div class="nm">ink-600</div><div class="hx">#2a2d36</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="nm">ink-500</div><div class="hx">#3a3e4a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-panel)"></div><div class="meta"><div class="nm">panel</div><div class="hx">8,9,13 / .94</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--border-subtle)"></div><div class="meta"><div class="nm">border</div><div class="hx">#2a3344</div></div></div>
  </body>
</html>
