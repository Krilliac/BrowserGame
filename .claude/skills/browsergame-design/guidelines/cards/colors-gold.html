<!-- @dsCard group="Colors" viewport="700x180" name="Gold — the one brand metal" subtitle="Warm WC3/Diablo gold: borders, hotkeys, parchment text" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--bg-app);
        font-family: var(--font-body);
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .sw {
        width: 96px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        overflow: hidden;
      }
      .chip {
        height: 56px;
      }
      .meta {
        padding: 6px 8px;
        background: #0a0b0f;
      }
      .nm {
        font-size: 11px;
        color: var(--text-body);
      }
      .hx {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-faint);
      }
    </style>
  </head>
  <body>
    <div class="sw"><div class="chip" style="background:var(--gold-200)"></div><div class="meta"><div class="nm">gold-200</div><div class="hx">#f0e6c4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><div class="meta"><div class="nm">gold-300 · text</div><div class="hx">#e7d9b0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><div class="meta"><div class="nm">gold-400</div><div class="hx">#d8bd78</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="meta"><div class="nm">gold-500 · accent</div><div class="hx">#c9a24b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="meta"><div class="nm">gold-600</div><div class="hx">#a8853a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-700)"></div><div class="meta"><div class="nm">gold-700</div><div class="hx">#6b5226</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cork)"></div><div class="meta"><div class="nm">cork · wood</div><div class="hx">#caa46a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--coin)"></div><div class="meta"><div class="nm">coin</div><div class="hx">#ffcf5c</div></div></div>
  </body>
</html>
