<!-- @dsCard group="Type" viewport="700x230" name="Display — Cinzel engraved" subtitle="Titles, item names, panel headers — tracked uppercase caps" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body {
        margin: 0;
        background: var(--bg-app);
        font-family: var(--font-display);
        padding: 26px 28px;
        color: var(--text-display);
      }
      .hero {
        font-weight: 900;
        font-size: 46px;
        letter-spacing: var(--tracking-display);
        text-transform: uppercase;
        line-height: 1.05;
        text-shadow: var(--shadow-text);
      }
      .h2 {
        font-weight: 600;
        font-size: 22px;
        letter-spacing: var(--tracking-heading);
        text-transform: uppercase;
        margin-top: 14px;
      }
      .item {
        font-weight: 700;
        font-size: 17px;
        margin-top: 12px;
        color: var(--rarity-legendary);
        text-shadow: var(--glow-legendary);
      }
      .meta {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-faint);
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="hero">Gloomwood</div>
    <div class="h2">The Shadow Crypt</div>
    <div class="item">Merciless Doomscar of the Colossus</div>
    <div class="meta">Cinzel · 400–900 · tracking 0.08–0.14em · UPPERCASE</div>
  </body>
</html>
